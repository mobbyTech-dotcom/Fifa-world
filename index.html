<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WC2026 Live Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080a0e;--bg2:#10131a;--bg3:#181d28;
  --card:#111520;--border:#1f2535;--border2:#2a3045;
  --red:#e8001c;--red2:#ff1a35;--gold:#f5c518;
  --green:#22c55e;--blue:#3b82f6;
  --text:#eef0f5;--text2:#7c8499;--text3:#485066;
  --font-d:'Barlow Condensed',sans-serif;--font-b:'Inter',sans-serif;
  --r:12px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);min-height:100vh;padding-bottom:40px}
button{font-family:var(--font-b);cursor:pointer}

/* HEADER */
.hdr{background:rgba(8,10,14,.95);border-bottom:1px solid var(--border);
  padding:12px 14px 0;position:sticky;top:0;z-index:200;backdrop-filter:blur(24px)}
.hdr-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.hdr-logo{font-size:22px}
.t1{font-family:var(--font-d);font-size:20px;font-weight:800;letter-spacing:.5px}
.t2{font-size:10px;color:var(--green);font-weight:600;margin-top:1px;letter-spacing:.3px}
.hdr-right{margin-left:auto;display:flex;gap:7px;align-items:center}
.live-badge{display:inline-flex;align-items:center;gap:5px;background:var(--red);color:#fff;
  font-size:10px;font-weight:700;padding:3px 9px;border-radius:4px;letter-spacing:.5px}
.live-badge::before{content:'';width:6px;height:6px;background:#fff;border-radius:50%;animation:blink 1.4s ease infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.notif-btn{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;
  padding:5px 10px;border-radius:var(--rs);border:1px solid var(--border2);
  background:var(--bg3);color:var(--text2);transition:all .2s}
.notif-btn.on{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.4);color:var(--green)}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border)}
.tab{flex:1;font-family:var(--font-d);font-size:14px;font-weight:700;
  padding:10px 6px;border:none;background:none;color:var(--text3);
  border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:color .15s}
.tab.active{color:var(--red2);border-bottom-color:var(--red2)}

/* PANELS */
.panel{display:none;padding:12px 12px 20px}.panel.active{display:block}

/* STATUS */
.status-bar{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text3);
  padding:7px 10px;background:var(--bg2);border-radius:var(--rs);
  border:1px solid var(--border);margin-bottom:10px}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot.g{background:var(--green);box-shadow:0 0 8px #22c55e88}
.dot.r{background:var(--red)}.dot.y{background:var(--gold)}
.upd{margin-left:auto;font-size:10px}

/* BUTTONS */
.btn-refresh{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;
  padding:9px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rs);
  color:var(--text2);font-size:13px;font-weight:600;margin-bottom:10px;transition:all .2s}
.btn-refresh:hover:not(:disabled){border-color:var(--blue);color:var(--text)}
.btn-refresh:disabled{opacity:.5;cursor:default}
.btn-ai{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;
  padding:10px;background:var(--blue);border:none;border-radius:var(--rs);
  color:#fff;font-size:13px;font-weight:600;margin-top:8px;transition:opacity .2s}
.btn-ai:disabled{opacity:.4;cursor:default}
.btn-ai.sec{background:var(--bg3);border:1px solid var(--border2);color:var(--text2)}

/* SECTION LABELS */
.slabel{font-family:var(--font-d);font-size:12px;font-weight:700;color:var(--text3);
  margin:14px 0 7px;display:flex;align-items:center;gap:7px;letter-spacing:.5px}
.slabel::after{content:'';flex:1;height:1px;background:var(--border)}

/* MATCH CARDS */
.mc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:11px 13px;margin-bottom:7px;position:relative;overflow:hidden;transition:border-color .2s}
.mc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:transparent}
.mc.live::before{background:var(--red)}.mc.live{border-color:rgba(232,0,28,.3)}
.mc-st{font-size:10px;font-weight:600;margin-bottom:7px;display:flex;align-items:center;gap:6px;letter-spacing:.3px}
.sl{color:var(--red2)}.sf{color:var(--text3)}.su{color:var(--gold)}
.mc-t{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.tn{flex:1;font-family:var(--font-d);font-size:18px;font-weight:700}
.tn.r{text-align:right}
.sw{display:flex;align-items:center;gap:5px;flex-shrink:0}
.sn{font-family:var(--font-d);font-size:30px;font-weight:800;min-width:28px;text-align:center;line-height:1}
.ssep{font-size:14px;color:var(--text3)}
.mc-m{font-size:11px;color:var(--text3);display:flex;justify-content:space-between}
.goals-box{margin-top:7px;padding-top:7px;border-top:1px solid var(--border)}
.gr{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text2);padding:2px 0}
.gm{font-size:10px;font-weight:700;color:var(--red2);min-width:24px;font-family:var(--font-d)}

/* PRED CARDS */
.pc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.ptitle{font-family:var(--font-d);font-size:19px;font-weight:700;margin-bottom:2px}
.psub{font-size:11px;color:var(--text3);margin-bottom:10px}
.wchip{display:inline-flex;align-items:center;gap:5px;
  background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);
  color:var(--green);font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;margin-bottom:8px}
.bar{display:flex;border-radius:4px;overflow:hidden;height:8px;gap:2px;margin:4px 0}
.bh{background:var(--blue)}.bd{background:#444}.ba{background:#7a0010}
.blab{display:flex;font-size:11px;margin-bottom:10px}
.blh{color:var(--blue);font-weight:600;min-width:52px}
.bld{flex:1;text-align:center;color:var(--text3)}
.bla{color:#f06070;font-weight:600;text-align:right;min-width:52px}
.preason{font-size:13px;color:var(--text2);line-height:1.65;padding-top:10px;border-top:1px solid var(--border)}
.preason strong{color:var(--text);font-weight:600}

/* GROUPS */
.gg{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:10px}
.gc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.gh{font-family:var(--font-d);font-size:13px;font-weight:700;letter-spacing:.5px;
  padding:8px 12px;background:var(--bg3);border-bottom:1px solid var(--border);color:var(--text3)}
.gc table{width:100%;border-collapse:collapse}
.gc th{font-size:10px;color:var(--text3);font-weight:600;text-align:center;padding:5px 3px;letter-spacing:.3px}
.gc th.tl{text-align:left;padding-left:11px}
.gc td{font-size:12px;text-align:center;padding:6px 3px;border-top:1px solid var(--border)}
.gc td.tl{text-align:left;padding-left:11px;font-weight:500;font-size:13px}
.gc tr.q td{color:var(--text)}
.gc tr.out td{color:var(--text3)}
.pv{font-weight:700;color:var(--blue)}

/* TOAST */
.tw{position:fixed;bottom:20px;right:14px;display:flex;flex-direction:column;gap:8px;z-index:9999;pointer-events:none;max-width:290px}
.tst{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);
  padding:11px 14px;box-shadow:0 4px 20px rgba(0,0,0,.5);pointer-events:auto;
  display:flex;gap:9px;align-items:flex-start;animation:tin .25s ease}
.tst.goal{border-left:3px solid var(--red2)}
@keyframes tin{from{transform:translateY(10px) scale(.97);opacity:0}to{transform:none;opacity:1}}
.ti{font-size:18px;flex-shrink:0}
.tb{flex:1;min-width:0}
.tt{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
.ts{font-size:11px;color:var(--text2)}
.tx{background:none;border:none;color:var(--text3);font-size:18px;line-height:1;padding:0}

/* LOADING */
.lc{text-align:center;padding:2rem;color:var(--text3)}
.spin{display:inline-block;width:16px;height:16px;border:2px solid var(--border2);
  border-top-color:var(--red2);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
.err{background:rgba(232,0,28,.08);border:1px solid rgba(232,0,28,.3);
  color:#f07070;padding:9px 12px;border-radius:var(--rs);font-size:12px;line-height:1.6;margin-top:8px}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-top">
    <span class="hdr-logo">⚽</span>
    <div>
      <div class="t1">WC2026 Live</div>
      <div class="t2">USA · CANADA · MEXICO &nbsp;|&nbsp; AI-Powered</div>
    </div>
    <div class="hdr-right">
      <button class="notif-btn" id="notifBtn" onclick="toggleNotif()">🔔 แจ้งเตือน</button>
      <span class="live-badge">LIVE</span>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('scores',this)">ผลบอลสด</button>
    <button class="tab" onclick="showTab('predict',this)">วิเคราะห์ AI 🤖</button>
    <button class="tab" onclick="showTab('groups',this)">ตารางกลุ่ม</button>
  </div>
</header>

<main>
  <div id="scores" class="panel active">
    <div class="status-bar">
      <div class="dot y" id="sDot"></div>
      <span id="sMsg">กำลังโหลด...</span>
      <span class="upd" id="sTime"></span>
    </div>
    <button class="btn-refresh" id="rfBtn" onclick="loadAll()">🔄 อัปเดตข้อมูลล่าสุด</button>
    <div id="scores-content"><div class="lc"><span class="spin"></span> กำลังเชื่อมต่อ Gemini...</div></div>
  </div>

  <div id="predict" class="panel">
    <div id="predict-content"></div>
  </div>

  <div id="groups" class="panel">
    <div id="groups-content"><div class="lc"><span class="spin"></span></div></div>
  </div>
</main>

<div class="tw" id="toastArea"></div>

<script>
const GEMINI_KEY = "AIzaSyDszKzbzmU42cNKBqRXW0hDTHxnH2HZ9MY";
const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`;
const TODAY = new Date().toLocaleDateString('th-TH',{day:'numeric',month:'long',year:'numeric',timeZone:'Asia/Bangkok'});
const TODAYISO = new Date().toISOString().split('T')[0];

/* ── NOTIFICATIONS ── */
let notifOn = false, notifPerm = false, pollTimer = null;
let prevGoals = {}; // key: "HomeAway" → {h:score, a:score}

function toggleNotif() {
  if (!notifOn) {
    if ('Notification' in window) {
      Notification.requestPermission().then(p => {
        notifPerm = p === 'granted';
        setNotif(true);
      });
    } else { setNotif(true); }
  } else { setNotif(false); }
}

function setNotif(on) {
  notifOn = on;
  const btn = document.getElementById('notifBtn');
  if (on) {
    btn.classList.add('on'); btn.textContent = '🔔 เปิดอยู่';
    pollTimer = setInterval(loadAll, 60000);
    toast('🔔','เปิดแจ้งเตือนแล้ว!','รับแจ้งทันทีเมื่อมีประตูหรือเกมเริ่ม',false,4000);
  } else {
    btn.classList.remove('on'); btn.textContent = '🔔 แจ้งเตือน';
    clearInterval(pollTimer);
    toast('🔕','ปิดแจ้งเตือนแล้ว','',false,3000);
  }
}

function toast(icon,title,sub='',goal=false,dur=5000){
  const a=document.getElementById('toastArea');
  const el=document.createElement('div');
  el.className=`tst${goal?' goal':''}`;
  el.innerHTML=`<span class="ti">${icon}</span><div class="tb"><div class="tt">${title}</div>${sub?`<div class="ts">${sub}</div>`:''}</div><button class="tx" onclick="this.closest('.tst').remove()">×</button>`;
  a.appendChild(el); setTimeout(()=>el.remove(),dur);
}

function checkGoals(matches){
  if(!notifOn)return;
  matches.forEach(m=>{
    const k=m.hname+'|'+m.aname;
    const hs=m.hscore??0, as=m.ascore??0;
    const prev=prevGoals[k];
    if(!prev && m.status==='live') toast('🏟️','เกมเริ่มแล้ว!',`${m.hflag}${m.hname} vs ${m.aname}${m.aflag}`,false,6000);
    if(prev){
      if(hs>prev.h){
        const g=(m.goals||[]).filter(g=>g.team==='home').slice(-1)[0];
        fireGoal(m.hflag+m.hname, g?.scorer||'?', g?.min||m.minute||'?', m.aname);
      }
      if(as>prev.a){
        const g=(m.goals||[]).filter(g=>g.team==='away').slice(-1)[0];
        fireGoal(m.aflag+m.aname, g?.scorer||'?', g?.min||m.minute||'?', m.hname);
      }
    }
    prevGoals[k]={h:hs,a:as};
  });
}

function fireGoal(team,scorer,min,opp){
  toast('⚽',`ประตู! ${team}`,`${scorer} ยิงนาทีที่ ${min}' · vs ${opp}`,true,8000);
  if(notifPerm&&notifOn){
    new Notification(`⚽ ประตู! ${team}`,{body:`${scorer} นาที ${min}' vs ${opp}`});
  }
}

/* ── GEMINI CALL ── */
async function gemini(prompt, jsonMode=true){
  const body = { contents:[{parts:[{text: jsonMode
    ? prompt + "\n\nIMPORTANT: Return ONLY valid JSON. No markdown fences, no explanation."
    : prompt}] }] };
  const r = await fetch(GEMINI_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok){ const e=await r.json(); throw new Error(e.error?.message||`HTTP ${r.status}`); }
  const d = await r.json();
  let text = d.candidates?.[0]?.content?.parts?.[0]?.text || '';
  if(jsonMode){
    text = text.replace(/```json|```/g,'').trim();
    return JSON.parse(text);
  }
  return text;
}

/* ── LOAD ALL (scores + groups in one call) ── */
let cachedData = null;

async function loadAll(){
  setLoading(true);
  setStatus('y','กำลังดึงข้อมูลจาก Gemini AI...');
  try {
    const data = await gemini(`
You are a real-time football data assistant. Today is ${TODAY} (${TODAYISO}).
FIFA World Cup 2026 started June 11, 2026. Hosts: USA, Canada, Mexico. 48 teams, 12 groups (A-L).

Return this EXACT JSON structure with REAL accurate data:
{
  "matches": [
    {
      "group": "Group A",
      "status": "live|final|upcoming",
      "minute": null,
      "hname": "Mexico", "hflag": "🇲🇽", "hscore": 2,
      "aname": "South Africa", "aflag": "🇿🇦", "ascore": 0,
      "time": "11 มิ.ย. 09:00 น.",
      "venue": "Estadio Azteca, CDMX",
      "goals": [
        {"team":"home","scorer":"Quiñones","min":23},
        {"team":"home","scorer":"Martín","min":67}
      ]
    }
  ],
  "groups": [
    {
      "name": "A",
      "teams": [
        {"t":"Mexico 🇲🇽","p":1,"w":1,"d":0,"l":0,"f":2,"a":0,"pts":3},
        {"t":"South Korea 🇰🇷","p":1,"w":1,"d":0,"l":0,"f":2,"a":1,"pts":3},
        {"t":"Czechia 🇨🇿","p":1,"w":0,"d":0,"l":1,"f":1,"a":2,"pts":0},
        {"t":"South Africa 🇿🇦","p":1,"w":0,"d":0,"l":1,"f":0,"a":2,"pts":0}
      ]
    }
  ]
}

Include:
- matches: ALL matches from last 4 days + next 4 days (played, live, upcoming). Use correct Thai time (UTC+7).
- groups: ALL 12 groups A through L with correct current standings.
- hscore/ascore: use null for upcoming matches, integer for played/live.
- Flags must be correct emoji flags for each country.
- Sort matches: live first, then upcoming by time, then final (most recent first).
`);
    cachedData = data;
    checkGoals(data.matches||[]);
    renderMatches(data.matches||[]);
    renderGroups(data.groups||[]);
    setStatus('g',`อัปเดตจาก Gemini AI · ${(data.matches||[]).length} แมตช์`);
  } catch(e) {
    console.error(e);
    setStatus('r','Gemini ตอบผิดพลาด: '+e.message);
    document.getElementById('scores-content').innerHTML=
      `<div class="err">⚠️ <strong>เกิดข้อผิดพลาด:</strong> ${e.message}<br><br>กด "อัปเดต" อีกครั้ง หรือตรวจสอบ API Key ของ Gemini</div>`;
  }
  setLoading(false);
  const n=new Date();
  document.getElementById('sTime').textContent=`อัปเดต ${n.getHours()}:${String(n.getMinutes()).padStart(2,'0')} น.`;
}

function setLoading(on){
  const btn=document.getElementById('rfBtn');
  btn.disabled=on;
  btn.innerHTML=on?'<span class="spin"></span> กำลังโหลด...':'🔄 อัปเดตข้อมูลล่าสุด';
}

function setStatus(c,m){
  document.getElementById('sDot').className=`dot ${c}`;
  document.getElementById('sMsg').textContent=m;
}

/* ── RENDER MATCHES ── */
function renderMatches(matches){
  if(!matches.length){
    document.getElementById('scores-content').innerHTML='<div class="lc" style="color:var(--text3)">ไม่พบข้อมูลแมตช์</div>';
    return;
  }
  const live=matches.filter(m=>m.status==='live');
  const soon=matches.filter(m=>m.status==='upcoming');
  const done=matches.filter(m=>m.status==='final');
  let html='';
  if(live.length){ html+=`<div class="slabel">🔴 กำลังแข่ง LIVE</div>`; live.forEach(m=>html+=mc(m)); }
  if(soon.length){ html+=`<div class="slabel">📅 กำลังจะเตะ</div>`; soon.forEach(m=>html+=mc(m)); }
  if(done.length){ html+=`<div class="slabel">✅ ผลการแข่งขัน</div>`; done.forEach(m=>html+=mc(m)); }
  document.getElementById('scores-content').innerHTML=html;
}

function mc(m){
  const sc=m.status==='live'?'sl':m.status==='final'?'sf':'su';
  const st=m.status==='live'?`🔴 LIVE ${m.minute?m.minute+"'":''}`:m.status==='final'?'✅ จบแล้ว':`⏰ ${m.time}`;
  const sh=m.hscore!=null
    ?`<div class="sw"><span class="sn">${m.hscore}</span><span class="ssep">:</span><span class="sn">${m.ascore}</span></div>`
    :`<div class="sw"><span class="sn" style="font-size:13px;color:var(--text3)">VS</span></div>`;
  const gs=m.goals?.length
    ?`<div class="goals-box">${m.goals.map(g=>`<div class="gr"><span class="gm">${g.min}'</span>⚽ ${g.scorer} <span style="color:var(--text3)">(${g.team==='home'?m.hname:m.aname})</span></div>`).join('')}</div>`:''
  return `<div class="mc ${m.status}">
    <div class="mc-st"><span class="${sc}">${st}</span><span style="color:var(--text3)">·</span><span style="color:var(--text3)">${m.group}</span></div>
    <div class="mc-t"><span class="tn">${m.hflag} ${m.hname}</span>${sh}<span class="tn r">${m.aname} ${m.aflag}</span></div>
    <div class="mc-m"><span>${m.venue||''}</span><span>${m.status==='upcoming'?'':m.time}</span></div>
    ${gs}
  </div>`;
}

/* ── RENDER GROUPS ── */
function renderGroups(groups){
  if(!groups.length){
    document.getElementById('groups-content').innerHTML='<div class="lc" style="color:var(--text3)">ไม่พบข้อมูลตาราง</div>';
    return;
  }
  let html='<div class="gg">';
  groups.forEach(g=>{
    const sorted=[...g.teams].sort((a,b)=>b.pts-a.pts||(b.f-b.a)-(a.f-a.a)||(b.f-a.f));
    html+=`<div class="gc">
      <div class="gh">GROUP ${g.name}</div>
      <table>
        <thead><tr><th class="tl">ทีม</th><th>P</th><th>W</th><th>D</th><th>L</th><th>+/-</th><th>แต้ม</th></tr></thead>
        <tbody>${sorted.map((t,i)=>`<tr class="${i<2?'q':'out'}">
          <td class="tl">${t.t}</td>
          <td>${t.p}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td>
          <td>${t.f-t.a>=0?'+':''}${t.f-t.a}</td>
          <td class="${t.pts>0?'pv':''}">${t.pts}</td>
        </tr>`).join('')}</tbody>
      </table>
    </div>`;
  });
  html+='</div>';
  document.getElementById('groups-content').innerHTML=html;
}

/* ── PREDICTIONS ── */
const PRED_LIST = [
  {id:'p1',home:'Argentina 🇦🇷',away:'Algeria 🇩🇿',group:'Group J',time:'14 มิ.ย.'},
  {id:'p2',home:'France 🇫🇷',away:'Senegal 🇸🇳',group:'Group I',time:'14 มิ.ย.'},
  {id:'p3',home:'Canada 🇨🇦',away:'Bosnia & Herzegovina 🇧🇦',group:'Group B',time:'14 มิ.ย.'},
  {id:'p4',home:'USA 🇺🇸',away:'Paraguay 🇵🇾',group:'Group D',time:'14 มิ.ย.'},
  {id:'p5',home:'Germany 🇩🇪',away:'Ivory Coast 🇨🇮',group:'Group E',time:'15 มิ.ย.'},
  {id:'p6',home:'Brazil 🇧🇷',away:'Morocco 🇲🇦',group:'Group C',time:'15 มิ.ย.'},
  {id:'p7',home:'England 🏴󠁧󠁢󠁥󠁮󠁧󠁿',away:'Croatia 🇭🇷',group:'Group L',time:'16 มิ.ย.'},
  {id:'p8',home:'Spain 🇪🇸',away:'Saudi Arabia 🇸🇦',group:'Group H',time:'16 มิ.ย.'},
];

let preds = {};
try { preds = JSON.parse(localStorage.getItem('wc26_preds3')||'{}'); } catch(e){}
function savePreds(){ try{localStorage.setItem('wc26_preds3',JSON.stringify(preds));}catch(e){} }

async function analyze(id,home,away,group,time){
  const btn=document.getElementById('ab_'+id);
  const err=document.getElementById('ae_'+id);
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span> Gemini กำลังวิเคราะห์...';}
  if(err) err.innerHTML='';
  try {
    const data = await gemini(`
You are a football analyst. Analyze this FIFA World Cup 2026 match:
${home} vs ${away} (${group}, ${time} 2026, Thailand time UTC+7)

Consider: current form, squad quality, injuries, head-to-head history, World Cup experience, group context.
Today is ${TODAY}.

Return ONLY this JSON:
{
  "winner": "TeamName (without flag emoji)",
  "homeWin": 50,
  "draw": 22,
  "awayWin": 28,
  "reasons": "HTML string in Thai with <strong>Factor:</strong> explanation. Use <br><br> between 3 factors. Be specific with player names and recent news."
}`);
    preds[id]={...data,id,home,away,group,time};
    savePreds();
    renderPreds();
  } catch(e) {
    if(btn){btn.disabled=false;btn.innerHTML='⚠️ ลองใหม่';}
    if(err) err.innerHTML=`<div class="err">Gemini Error: ${e.message}</div>`;
  }
}

function renderPreds(){
  let html='';
  PRED_LIST.forEach(m=>{
    const p=preds[m.id];
    if(!p){
      html+=`<div class="pc">
        <div class="ptitle">${m.home} vs ${m.away}</div>
        <div class="psub">${m.group} · ${m.time} 2026</div>
        <button class="btn-ai" id="ab_${m.id}" onclick="analyze('${m.id}','${m.home}','${m.away}','${m.group}','${m.time}')">✨ ให้ Gemini วิเคราะห์เกมนี้</button>
        <div id="ae_${m.id}"></div>
      </div>`;
    } else {
      const hw=p.homeWin||40,dr=p.draw||25,aw=p.awayWin||35;
      html+=`<div class="pc">
        <div class="ptitle">${p.home} vs ${p.away}</div>
        <div class="psub">${p.group} · ${p.time} 2026 · Gemini AI</div>
        <div class="wchip">🏆 คาดว่า ${p.winner} จะชนะ</div>
        <div class="bar"><div class="bh" style="flex:${hw}"></div><div class="bd" style="flex:${dr}"></div><div class="ba" style="flex:${aw}"></div></div>
        <div class="blab"><span class="blh">เหย้า ${hw}%</span><span class="bld">เสมอ ${dr}%</span><span class="bla">${aw}% เยือน</span></div>
        <div class="preason">${p.reasons||''}</div>
        <button class="btn-ai sec" id="ab_${m.id}" style="margin-top:10px" onclick="analyze('${m.id}','${m.home}','${m.away}','${m.group}','${m.time}')">🔄 วิเคราะห์ใหม่</button>
        <div id="ae_${m.id}"></div>
      </div>`;
    }
  });
  document.getElementById('predict-content').innerHTML=html;
}

/* ── TABS ── */
function showTab(id,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  el.classList.add('active');
  // lazy load predict when switching
  if(id==='predict' && !document.getElementById('predict-content').children.length) renderPreds();
}

/* ── INIT ── */
document.addEventListener('DOMContentLoaded',()=>{
  loadAll();
  renderPreds();
});
</script>
