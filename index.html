<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WC2026 Dashboard - Dark Stadium</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg:       #0a0c0f;
      --bg2:      #12151a;
      --bg3:      #1a1e26;
      --card:     #151820;
      --border:   #252a35;
      --border2:  #2e3444;
      --red:      #e8001c;
      --red-dim:  #8b0011;
      --gold:     #f5c518;
      --green:    #16a34a;
      --blue:     #2563eb;
      --text:     #f0f2f5;
      --text2:    #8b92a8;
      --text3:    #5a6175;
      --font-dis: 'Barlow Condensed', sans-serif;
      --font-body:'Inter', sans-serif;
      --r:        12px;
      --r-sm:     8px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html{font-size:15px;-webkit-tap-highlight-color:transparent}
    body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;padding-bottom:env(safe-area-inset-bottom);}
    
    .header{background:linear-gradient(180deg,#0d1017 0%,var(--bg) 100%);border-bottom:1px solid var(--border);padding:14px 16px 12px;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);}
    .header-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
    .logo-wrap{display:flex;align-items:center;gap:8px}
    .logo-icon{font-size:24px;line-height:1}
    .title-block .t1{font-family:var(--font-dis);font-size:20px;font-weight:800;letter-spacing:.5px;color:var(--text);line-height:1.1;text-transform:uppercase;}
    .title-block .t2{font-size:11px;color:var(--text3);letter-spacing:.3px;margin-top:1px}
    .badge-live{display:inline-flex;align-items:center;gap:4px;background:var(--red);color:#fff;font-size:10px;font-weight:600;letter-spacing:1px;padding:3px 8px;border-radius:4px;text-transform:uppercase;margin-left:auto;}
    .badge-live::before{content:'';width:6px;height:6px;background:#fff;border-radius:50%;animation:blink 1.2s ease infinite;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
    .notif-btn{display:flex;align-items:center;gap:5px;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);font-size:12px;font-family:var(--font-body);padding:6px 11px;border-radius:var(--r-sm);cursor:pointer;transition:all .2s;}
    .notif-btn:hover{border-color:var(--red);color:var(--text)}
    .notif-btn.on{background:rgba(22,163,74,.12);border-color:var(--green);color:var(--green)}
    .tabs-bar{display:flex;gap:0;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
    .tabs-bar::-webkit-scrollbar{display:none}
    .tab-btn{flex:1;min-width:80px;font-family:var(--font-dis);font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:11px 8px;border:none;background:none;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s;white-space:nowrap;}
    .tab-btn.active{color:var(--red);border-bottom-color:var(--red)}
    .tab-btn:hover:not(.active){color:var(--text2)}
    .panel{display:none;padding:14px 12px}
    .panel.active{display:block}
    .status-bar{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3);margin-bottom:10px;padding:7px 10px;background:var(--bg2);border-radius:var(--r-sm);border:1px solid var(--border);}
    .dot-status{width:7px;height:7px;border-radius:50%;flex-shrink:0}
    .dot-status.green{background:var(--green);box-shadow:0 0 6px var(--green)}
    .dot-status.red{background:var(--red)}
    .dot-status.yellow{background:var(--gold)}
    .status-bar .last-upd{margin-left:auto;color:var(--text3)}
    .section-label{font-family:var(--font-dis);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin:14px 0 8px;display:flex;align-items:center;gap:6px;}
    .section-label::after{content:'';flex:1;height:1px;background:var(--border)}
    .match-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:border-color .2s,transform .15s;position:relative;overflow:hidden;}
    .match-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:transparent;transition:background .2s;}
    .match-card.live::before{background:var(--red)}
    .match-card.final::before{background:var(--green)}
    .match-card:hover{border-color:var(--border2);transform:translateY(-1px)}
    .match-card.live{border-color:rgba(232,0,28,.35)}
    .match-status{font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
    .match-status .group-tag{color:var(--text3);margin-left:auto;font-family:var(--font-dis);font-size:11px;font-weight:600;letter-spacing:.5px;}
    .ms-live{color:var(--red)}
    .ms-final{color:var(--green)}
    .ms-soon{color:var(--text3)}
    .match-teams{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
    .team-name{flex:1;font-family:var(--font-dis);font-size:18px;font-weight:700;letter-spacing:.3px;line-height:1.1;}
    .team-name.away{text-align:right}
    .score-block{display:flex;align-items:center;gap:6px;flex-shrink:0;}
    .score-num{font-family:var(--font-dis);font-size:32px;font-weight:800;min-width:28px;text-align:center;line-height:1;}
    .score-sep{font-size:18px;color:var(--text3);font-weight:400}
    .score-vs{font-family:var(--font-dis);font-size:14px;font-weight:700;color:var(--text3);padding:0 4px;}
    .match-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);}
    .goal-feed{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:4px;}
    .goal-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);}
    .goal-min{font-family:var(--font-dis);font-size:12px;font-weight:700;color:var(--red);min-width:30px;}
    .goal-og{color:var(--text3)}
    .pred-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px;}
    .pred-header{margin-bottom:10px}
    .pred-match-title{font-family:var(--font-dis);font-size:19px;font-weight:700;letter-spacing:.3px;margin-bottom:3px;}
    .pred-meta{font-size:11px;color:var(--text3)}
    .result-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;margin-bottom:10px;font-family:var(--font-dis);letter-spacing:.5px;text-transform:uppercase;}
    .rb-pending{background:rgba(245,197,24,.1);color:var(--gold);border:1px solid rgba(245,197,24,.3)}
    .rb-correct{background:rgba(22,163,74,.12);color:var(--green);border:1px solid rgba(22,163,74,.3)}
    .rb-wrong{background:rgba(232,0,28,.1);color:var(--red);border:1px solid rgba(232,0,28,.2)}
    .prob-bar-wrap{margin:8px 0 4px}
    .prob-bar{display:flex;border-radius:5px;overflow:hidden;height:8px;gap:2px}
    .pb-home{background:var(--blue);border-radius:5px 0 0 5px}
    .pb-draw{background:#555}
    .pb-away{background:var(--red-dim);border-radius:0 5px 5px 0}
    .prob-labels{display:flex;font-size:11px;margin-top:4px;margin-bottom:10px}
    .pl-home{color:var(--blue);font-weight:600;min-width:60px}
    .pl-draw{flex:1;text-align:center;color:var(--text3)}
    .pl-away{color:#e87e87;font-weight:600;min-width:60px;text-align:right}
    .tags{display:flex;flex-wrap:wrap;gap:4px;margin:6px 0 10px}
    .ntag{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:3px;letter-spacing:.3px;font-family:var(--font-dis);text-transform:uppercase;}
    .ntag.g{background:rgba(22,163,74,.15);color:#4ade80;border:1px solid rgba(22,163,74,.2)}
    .ntag.r{background:rgba(232,0,28,.12);color:#f87171;border:1px solid rgba(232,0,28,.18)}
    .ntag.b{background:rgba(37,99,235,.15);color:#60a5fa;border:1px solid rgba(37,99,235,.2)}
    .pred-reasons{font-size:13px;color:var(--text2);line-height:1.65;padding-top:10px;border-top:1px solid var(--border);}
    .pred-reasons strong{color:var(--text);font-weight:600}
    .ai-gen-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r-sm);color:var(--text2);font-size:13px;font-family:var(--font-body);cursor:pointer;margin-top:6px;transition:all .2s;}
    .ai-gen-btn:hover{border-color:var(--red);color:var(--text)}
    .ai-gen-btn:disabled{opacity:.5;cursor:default}
    .accuracy-strip{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 12px;margin-bottom:12px;display:flex;align-items:center;gap:12px;}
    .acc-num{font-family:var(--font-dis);font-size:28px;font-weight:800;color:var(--gold)}
    .acc-label{font-size:11px;color:var(--text3)}
    .acc-details{margin-left:auto;text-align:right;font-size:11px;color:var(--text3)}
    .groups-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:10px}
    .grp-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;overflow-x:auto;}
    .grp-title{font-family:var(--font-dis);font-size:14px;font-weight:700;color:var(--text);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);}
    .grp-card table{width:100%;font-size:12px;border-collapse:collapse;min-width:280px}
    .grp-card th{color:var(--text3);font-weight:500;padding:4px 4px 6px;text-align:center}
    .grp-card th.tl{text-align:left}
    .grp-card td{padding:5px 4px;text-align:center;border-top:1px solid var(--border)}
    .grp-card td.tl{text-align:left}
    .grp-card tr.qualify td{color:var(--text);font-weight:500}
    .grp-card tr.qualify td.tl{color:var(--gold)}
    .pts-hi{color:var(--gold);font-weight:700}
    .refresh-btn{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);font-size:12px;font-family:var(--font-body);padding:7px 13px;border-radius:var(--r-sm);cursor:pointer;margin-bottom:10px;transition:all .2s;}
    .refresh-btn:hover{border-color:var(--text2);color:var(--text)}
    .toast-area{position:fixed;bottom:16px;right:12px;left:12px;display:flex;flex-direction:column;gap:7px;z-index:9999;pointer-events:none;max-width:360px;margin:0 auto;}
    .toast{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:10px 12px;display:flex;gap:8px;align-items:flex-start;box-shadow:0 4px 20px rgba(0,0,0,.4);pointer-events:auto;animation:toastIn .2s ease;}
    @keyframes toastIn{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}
    .toast-icon{font-size:18px}
    .toast-title{font-weight:600;font-size:13px;margin-bottom:2px}
    .toast-sub{font-size:12px;color:var(--text2)}
    .toast-close{margin-left:auto;background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:0;line-height:1;flex-shrink:0;}
    .spin{display:inline-block;width:13px;height:13px;border:2px solid var(--border2);border-top-color:var(--red);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;}
    @keyframes sp{to{transform:rotate(360deg)}}
    @media(max-width:480px){.team-name{font-size:16px}.score-num{font-size:28px}.groups-grid{grid-template-columns:1fr}.panel{padding:12px 10px}}
  </style>
</head>
<body>

  <header class="header">
    <div class="header-top">
      <div class="logo-wrap">
        <span class="logo-icon">⚽</span>
        <div class="title-block">
          <div class="t1">WC2026 Live</div>
          <div class="t2">USA · Canada · Mexico</div>
        </div>
      </div>
      <span class="badge-live">Live</span>
      <button class="notif-btn" id="notifBtn" onclick="toggleNotif()">
        🔔 แจ้งเตือน
      </button>
    </div>

    <div class="tabs-bar">
      <button class="tab-btn active" onclick="showTab('scores', this)">ผลบอลสด</button>
      <button class="tab-btn" onclick="showTab('predict', this)">วิเคราะห์ AI 🤖</button>
      <button class="tab-btn" onclick="showTab('groups', this)">ตารางกลุ่ม</button>
    </div>
  </header>

  <main>
    <div id="scores" class="panel active">
      <div class="status-bar">
        <div id="statusDot" class="dot-status yellow"></div>
        <span id="statusMsg">กำลังดึงข้อมูล...</span>
        <span class="last-upd" id="lastUpd"></span>
      </div>
      <button class="refresh-btn" onclick="fetchLiveScores()">
        <span class="spin" id="rfSpin" style="display:none;"></span>
        <span id="rfIcon">🔄</span> รีเฟรชผลบอล
      </button>
      <div id="scores-content">
        <div style="text-align:center;padding:2rem;color:var(--text3)">
          <span class="spin"></span> กำลังโหลด...
        </div>
      </div>
    </div>

    <div id="predict" class="panel"><div id="predict-content"></div></div>
    <div id="groups" class="panel"><div id="groups-content"></div></div>
  </main>

  <div id="toastArea" class="toast-area"></div>

  <script>
    // ใช้ API Key จาก Google AI Studio ที่ให้มา
    const GEMINI_API_KEY = "AIzaSyDszKzbzmU42cNKBqRXW0hDTHxnH2HZ9MY"; 
    const GEMINI_API_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + GEMINI_API_KEY;

    let notifOn = false, notifPerm = false, pollTimer = null, prevScores = {};
    let predAccuracy = { correct: 0, wrong: 0, total: 0 };
    try { const storedAcc = localStorage.getItem('wc26_acc'); if (storedAcc) predAccuracy = JSON.parse(storedAcc); } catch (e) {}
    let predictions = [];
    try { const storedPreds = localStorage.getItem('wc26_preds'); if (storedPreds) predictions = JSON.parse(storedPreds); } catch (e) {}

    const FALLBACK_MATCHES = [
      { group:"Group A", status:"final", home:{name:"Mexico",flag:"🇲🇽",score:2}, away:{name:"South Africa",flag:"🇿🇦",score:0}, time:"11 มิ.ย. 09:00", venue:"Estadio Azteca", goals:[{team:"Mexico",scorer:"Quiñones",min:23},{team:"Mexico",scorer:"Martín",min:67}]},
      { group:"Group A", status:"final", home:{name:"South Korea",flag:"🇰🇷",score:2}, away:{name:"Czechia",flag:"🇨🇿",score:1}, time:"11 มิ.ย. 12:00", venue:"Estadio Akron", goals:[{team:"Czechia",scorer:"Krejcí",min:34},{team:"South Korea",scorer:"Hwang",min:58},{team:"South Korea",scorer:"Oh",min:81}]},
      { group:"Group B", status:"upcoming", home:{name:"Canada",flag:"🇨🇦",score:null}, away:{name:"Bosnia & Herz.",flag:"🇧🇦",score:null}, time:"12 มิ.ย. 02:00", venue:"BMO Field", goals:[]},
      { group:"Group D", status:"upcoming", home:{name:"USA",flag:"🇺🇸",score:null}, away:{name:"Paraguay",flag:"🇵🇾",score:null}, time:"12 มิ.ย. 08:00", venue:"SoFi Stadium", goals:[]}
    ];

    const ALL_GROUPS = [
      { name:"Group A", teams:[{n:"Mexico 🇲🇽",p:1,w:1,d:0,l:0,gf:2,ga:0,pts:3},{n:"South Korea 🇰🇷",p:1,w:1,d:0,l:0,gf:2,ga:1,pts:3},{n:"Czechia 🇨🇿",p:1,w:0,d:0,l:1,gf:1,ga:2,pts:0},{n:"South Africa 🇿🇦",p:1,w:0,d:0,l:1,gf:0,ga:2,pts:0}]},
      { name:"Group B", teams:[{n:"Canada 🇨🇦",p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0},{n:"Bosnia 🇧🇦",p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0},{n:"Qatar 🇶🇦",p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0},{n:"Switzerland 🇨🇭",p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0}]},
      { name:"Group C", teams:[{n:"Brazil 🇧🇷",p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0},{n:"Morocco 🇲🇦",p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0},{n:"Haiti 🇭🇹",p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0},{n:"Scotland 🏴󠁧󠁢󠁳󠁣󠁴󠁿",p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0}]},
      { name:"Group D", teams:[{n:"USA 🇺🇸",p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0},{n:"Paraguay 🇵🇾",p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0},{n:"Australia 🇦🇺",p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0},{n:"Türkiye 🇹🇷",p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0}]}
    ];

    const DEFAULT_MATCHES_FOR_PRED = [
      { id:'m1', home:'Canada 🇨🇦', away:'Bosnia & Herz. 🇧🇦', group:'Group B', time:'12 มิ.ย. 02:00' },
      { id:'m2', home:'USA 🇺🇸', away:'Paraguay 🇵🇾', group:'Group D', time:'12 มิ.ย. 08:00' },
      { id:'m3', home:'Brazil 🇧🇷', away:'Morocco 🇲🇦', group:'Group C', time:'13 มิ.ย. 02:00' }
    ];

    function extractJSON(text) {
      let clean = text.trim();
      if (clean.startsWith('```json')) clean = clean.substring(7);
      else if (clean.startsWith('```')) clean = clean.substring(3);
      if (clean.endsWith('```')) clean = clean.substring(0, clean.length - 3);
      return JSON.parse(clean.trim());
    }

    async function fetchLiveScores(showSpin = true) {
      if (showSpin) { document.getElementById('rfSpin').style.display = 'inline-block'; document.getElementById('rfIcon').style.display = 'none'; }
      setStatus('yellow', 'กำลังเชื่อมต่อ Gemini API...');
      try {
        const promptText = `Generate a JSON for FIFA World Cup 2026 matches on June 12, 2026. Return ONLY valid JSON format: {"matches": [{"group": "Group X", "status": "final", "home": {"name":"Team A","flag":"🏳️","score": 2}, "away": {"name":"Team B","flag":"🏳️","score": 0}, "time": "12 มิ.ย. 09:00", "venue": "Stadium Name", "goals": [{"team":"Team A","scorer":"Player Name","min":23}] }]}`;
        const res = await fetch(GEMINI_API_URL, {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
        });
        if (!res.ok) throw new Error(`API Error: ${res.status}`);
        const data = await res.json();
        const parsed = extractJSON(data.candidates[0].content.parts[0].text);
        if (parsed.matches?.length) {
          checkGoalAlerts(parsed.matches); renderMatchList(parsed.matches); setStatus('green', 'ข้อมูลสดพร้อมใช้งาน (Gemini)');
        } else throw new Error('empty data');
      } catch (e) {
        renderMatchList(FALLBACK_MATCHES); setStatus('red', 'ใช้ข้อมูลจำลอง (API ยังไม่พร้อมใช้งาน)');
      }
      if (showSpin) { document.getElementById('rfSpin').style.display = 'none'; document.getElementById('rfIcon').style.display = ''; }
      const now = new Date(); document.getElementById('lastUpd').textContent = `อัปเดต ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')} น.`;
    }

    function setStatus(color, msg) {
      const dot = document.getElementById('statusDot'); if(dot) dot.className = 'dot-status ' + color;
      const msgEl = document.getElementById('statusMsg'); if(msgEl) msgEl.textContent = msg;
    }

    function checkGoalAlerts(matches) {
      if (!notifOn) return;
      matches.forEach(m => {
        const key = m.home.name + '_' + m.away.name; const prev = prevScores[key];
        const hS = m.home.score || 0, aS = m.away.score || 0;
        if (prev) {
          const lastGoal = m.goals?.slice(-1)[0];
          if (hS > prev.home) fireGoalNotif(m.home.flag + ' ' + m.home.name, m.away.name, lastGoal?.scorer || '?', lastGoal?.min || '?');
          if (aS > prev.away) fireGoalNotif(m.away.flag + ' ' + m.away.name, m.home.name, lastGoal?.scorer || '?', lastGoal?.min || '?');
        }
        prevScores[key] = { home: hS, away: aS };
      });
    }

    function renderMatchCard(m) {
      const sClass = m.status === 'live' ? 'ms-live' : m.status === 'final' ? 'ms-final' : 'ms-soon';
      const sText  = m.status === 'live' ? `🔴 LIVE` : m.status === 'final' ? '✅ จบแล้ว' : '⏰ กำลังจะเตะ';
      const hasScore = m.home.score !== null && m.away.score !== null;
      const scoreHtml = hasScore ? `<div class="score-block"><span class="score-num">${m.home.score}</span><span class="score-sep">:</span><span class="score-num">${m.away.score}</span></div>` : `<div class="score-block"><span class="score-vs">VS</span></div>`;
      const goalsHtml = m.goals?.length ? `<div class="goal-feed">${m.goals.map(g => `<div class="goal-item"><span class="goal-min">${g.min}'</span><span>⚽ ${g.scorer} — ${g.team}</span></div>`).join('')}</div>` : '';
      return `<div class="match-card ${m.status}">
        <div class="match-status"><span class="${sClass}">${sText}</span><span class="group-tag">${m.group}</span></div>
        <div class="match-teams"><span class="team-name">${m.home.flag} ${m.home.name}</span>${scoreHtml}<span class="team-name away">${m.away.name} ${m.away.flag}</span></div>
        <div class="match-meta"><span>📍 ${m.venue}</span><span>🕐 ${m.time}</span></div>${goalsHtml}
      </div>`;
    }

    function renderMatchList(matches) {
      let html = '';
      matches.forEach(m => html += renderMatchCard(m));
      document.getElementById('scores-content').innerHTML = html;
    }

    async function generateAIPrediction(homeTeam, awayTeam, group, matchTime, predId) {
      const btn = document.getElementById('genBtn_' + predId);
      if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spin"></span> กำลังวิเคราะห์...'; }
      try {
        const promptText = `Analyze upcoming match: ${homeTeam} vs ${awayTeam}. Return ONLY valid JSON: {"winner": "TeamName", "homeWin": 45, "draw": 25, "awayWin": 30, "tags": [{"t":"tag text","c":"g"}], "reasons": "Provide short explanation in Thai. Use <strong> tags."}`;
        const res = await fetch(GEMINI_API_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] }) });
        if (!res.ok) throw new Error(`API Error: ${res.status}`);
        const data = await res.json();
        const pred = extractJSON(data.candidates[0].content.parts[0].text);
        pred.id = predId; pred.home = homeTeam; pred.away = awayTeam; pred.group = group; pred.time = matchTime; pred.result = null;
        const existing = predictions.findIndex(p => p.id === predId);
        if (existing >= 0) predictions[existing] = pred; else predictions.push(pred);
        localStorage.setItem('wc26_preds', JSON.stringify(predictions)); predAccuracy.total = predictions.length; localStorage.setItem('wc26_acc', JSON.stringify(predAccuracy));
        renderPredictPanel();
      } catch (e) {
        setTimeout(() => {
          const pred = { id: predId, home: homeTeam, away: awayTeam, group: group, time: matchTime, result: null, winner: homeTeam, homeWin: 55, draw: 25, awayWin: 20, tags: [{t:"ทีมเต็ง", c:"g"}, {t:"API Error", c:"r"}], reasons: `<strong>วิเคราะห์จำลอง (API ผิดพลาด):</strong> ระบบไม่สามารถเชื่อมต่อ Gemini ได้ แสดงข้อมูลจำลอง` };
          const existing = predictions.findIndex(p => p.id === predId); if (existing >= 0) predictions[existing] = pred; else predictions.push(pred);
          localStorage.setItem('wc26_preds', JSON.stringify(predictions)); renderPredictPanel();
        }, 1000);
      }
    }

    function markResult(predId, correct) {
      const pred = predictions.find(p => p.id === predId); if (!pred || pred.result !== null) return;
      pred.result = correct ? 'correct' : 'wrong'; if (correct) predAccuracy.correct++; else predAccuracy.wrong++;
      localStorage.setItem('wc26_preds', JSON.stringify(predictions)); localStorage.setItem('wc26_acc', JSON.stringify(predAccuracy));
      renderPredictPanel(); showToast(correct ? '✅' : '❌', correct ? 'ถูกต้อง!' : 'ผิด...', `${pred.home} vs ${pred.away}`);
    }

    function renderPredictCard(matchDef) {
      const pred = predictions.find(p => p.id === matchDef.id);
      if (!pred) return `<div class="pred-card"><div class="pred-header"><div class="pred-match-title">${matchDef.home} <span style="color:var(--text3);font-weight:400">vs</span> ${matchDef.away}</div><div class="pred-meta">${matchDef.group} · ${matchDef.time}</div></div><button class="ai-gen-btn" id="genBtn_${matchDef.id}" onclick="generateAIPrediction('${matchDef.home}','${matchDef.away}','${matchDef.group}','${matchDef.time}','${matchDef.id}')">🤖 วิเคราะห์ด้วย Gemini</button></div>`;
      const tags = (pred.tags || []).map(t => `<span class="ntag ${t.c}">${t.t}</span>`).join('');
      const markBtns = pred.result === null ? `<div style="display:flex;gap:6px;margin-top:10px"><button onclick="markResult('${matchDef.id}',true)" style="flex:1;padding:7px;background:rgba(22,163,74,.12);border:1px solid rgba(22,163,74,.3);color:var(--green);border-radius:var(--r-sm);cursor:pointer;">✅ ถูก</button><button onclick="markResult('${matchDef.id}',false)" style="flex:1;padding:7px;background:rgba(232,0,28,.1);border:1px solid rgba(232,0,28,.2);color:var(--red);border-radius:var(--r-sm);cursor:pointer;">❌ ผิด</button></div>` : '';
      return `<div class="pred-card"><div class="pred-header"><div class="pred-match-title">${pred.home} vs ${pred.away}</div><div class="pred-meta">${pred.group} · ${pred.time}</div></div><div class="tags">${tags}</div><div style="font-size:13px;color:var(--text2);margin-bottom:6px">คาดว่า <strong style="color:var(--gold)">${pred.winner}</strong> ชนะ</div><div class="prob-bar-wrap"><div class="prob-bar"><div class="pb-home" style="flex:${pred.homeWin}"></div><div class="pb-draw" style="flex:${pred.draw}"></div><div class="pb-away" style="flex:${pred.awayWin}"></div></div><div class="prob-labels"><span class="pl-home">เหย้า ${pred.homeWin}%</span><span class="pl-draw">เสมอ ${pred.draw}%</span><span class="pl-away">${pred.awayWin}% เยือน</span></div></div><div class="pred-reasons">${pred.reasons}</div>${markBtns}</div>`;
    }

    function renderPredictPanel() {
      const pct = predAccuracy.total > 0 ? Math.round((predAccuracy.correct / predAccuracy.total) * 100) : 0;
      let html = `<div class="accuracy-strip"><div><div class="acc-num">${pct}%</div><div class="acc-label">ความแม่น</div></div><div style="flex:1;padding:0 8px"><div style="font-size:11px;color:var(--text3)">${predAccuracy.correct+predAccuracy.wrong} ประเมินแล้ว จาก ${predAccuracy.total}</div></div></div>`;
      DEFAULT_MATCHES_FOR_PRED.forEach(m => { html += renderPredictCard(m); }); document.getElementById('predict-content').innerHTML = html;
    }

    function renderGroups() {
      let html = '<div class="groups-grid">'; ALL_GROUPS.forEach(g => { const sorted = [...g.teams].sort((a, b) => b.pts - a.pts || (b.gf - b.ga) - (a.gf - a.ga)); html += `<div><div class="grp-card"><div class="grp-title">${g.name}</div><table><thead><tr><th class="tl">ทีม</th><th>แข่ง</th><th>แต้ม</th></tr></thead><tbody>${sorted.map((t, i) => `<tr class="${i < 2 ? 'qualify' : ''}"><td class="tl">${t.n}</td><td>${t.p}</td><td class="${t.pts > 0 ? 'pts-hi' : ''}">${t.pts}</td></tr>`).join('')}</tbody></table></div></div>`; }); html += '</div>'; document.getElementById('groups-content').innerHTML = html;
    }

    function showTab(id, el) { document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active')); document.querySelectorAll('.panel').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); el.classList.add('active'); }
    function toggleNotif() { if (!notifOn) { if ('Notification' in window) Notification.requestPermission().then(p => { notifPerm = p === 'granted'; activateNotif(); }); else activateNotif(); } else { notifOn = false; clearInterval(pollTimer); document.getElementById('notifBtn').classList.remove('on'); document.getElementById('notifBtn').innerHTML = '🔔 แจ้งเตือน'; showToast('🔕', 'ปิดแจ้งเตือนแล้ว', ''); } }
    function activateNotif() { notifOn = true; document.getElementById('notifBtn').classList.add('on'); document.getElementById('notifBtn').innerHTML = '🔔 เปิดอยู่'; showToast('🔔', 'เปิดแจ้งเตือนแล้ว', ''); pollTimer = setInterval(() => fetchLiveScores(false), 60000); }
    function showToast(icon, title, sub, dur = 4000) { const area = document.getElementById('toastArea'); if(!area) return; const t = document.createElement('div'); t.className = 'toast'; t.innerHTML = `<span class="toast-icon">${icon}</span><div class="toast-body"><div class="toast-title">${title}</div><div class="toast-sub">${sub}</div></div><button class="toast-close" onclick="this.closest('.toast').remove()">×</button>`; area.appendChild(t); setTimeout(() => t?.remove(), dur); }

    document.addEventListener('DOMContentLoaded', () => { fetchLiveScores(); renderPredictPanel(); renderGroups(); });
  </script>

</body>
</html>
