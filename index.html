<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WC2026 Dashboard - Live & AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg:       #0a0c0f; --bg2:      #12151a; --bg3:      #1a1e26;
      --card:     #151820; --border:   #252a35; --border2:  #2e3444;
      --red:      #e8001c; --red-dim:  #8b0011; --gold:     #f5c518;
      --green:    #16a34a; --blue:     #2563eb; --text:     #f0f2f5;
      --text2:    #8b92a8; --text3:    #5a6175;
      --font-dis: 'Barlow Condensed', sans-serif; --font-body:'Inter', sans-serif;
      --r: 12px; --r-sm: 8px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html{font-size:15px;-webkit-tap-highlight-color:transparent}
    body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;padding-bottom:env(safe-area-inset-bottom);}
    
    .header{background:linear-gradient(180deg,#0d1017 0%,var(--bg) 100%);border-bottom:1px solid var(--border);padding:14px 16px 12px;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);}
    .header-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
    .logo-icon{font-size:24px;line-height:1}
    .title-block .t1{font-family:var(--font-dis);font-size:20px;font-weight:800;letter-spacing:.5px;color:var(--text);line-height:1.1;}
    .title-block .t2{font-size:11px;color:#16a34a;letter-spacing:.3px;margin-top:1px;font-weight:600;}
    .badge-live{display:inline-flex;align-items:center;gap:4px;background:var(--red);color:#fff;font-size:10px;font-weight:600;padding:3px 8px;border-radius:4px;margin-left:auto;}
    .badge-live::before{content:'';width:6px;height:6px;background:#fff;border-radius:50%;animation:blink 1.2s ease infinite;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
    
    .tabs-bar{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;}
    .tabs-bar::-webkit-scrollbar{display:none}
    .tab-btn{flex:1;font-family:var(--font-dis);font-size:14px;font-weight:600;padding:11px 8px;border:none;background:none;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;}
    .tab-btn.active{color:var(--red);border-bottom-color:var(--red)}
    
    .panel{display:none;padding:14px 12px} .panel.active{display:block}
    .status-bar{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3);margin-bottom:10px;padding:7px 10px;background:var(--bg2);border-radius:var(--r-sm);border:1px solid var(--border);}
    .dot-status{width:7px;height:7px;border-radius:50%;}
    .dot-status.green{background:var(--green);box-shadow:0 0 6px var(--green)}
    .dot-status.red{background:var(--red)} .dot-status.yellow{background:var(--gold)}
    
    .section-label{font-family:var(--font-dis);font-size:12px;font-weight:700;color:var(--text3);margin:14px 0 8px;display:flex;align-items:center;gap:6px;}
    .section-label::after{content:'';flex:1;height:1px;background:var(--border)}
    .match-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;position:relative;overflow:hidden;}
    .match-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:transparent;}
    .match-card.live::before{background:var(--red)} .match-card.live{border-color:rgba(232,0,28,.35)}
    .match-status{font-size:10px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
    .ms-live{color:var(--red)} .ms-final{color:var(--text3)} .ms-soon{color:var(--gold)}
    
    .match-teams{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
    .team-name{flex:1;font-family:var(--font-dis);font-size:18px;font-weight:700;} .team-name.away{text-align:right}
    .score-block{display:flex;align-items:center;gap:6px;}
    .score-num{font-family:var(--font-dis);font-size:32px;font-weight:800;min-width:28px;text-align:center;}
    
    .pred-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px;}
    .pred-header{margin-bottom:10px}
    .pred-match-title{font-family:var(--font-dis);font-size:19px;font-weight:700;}
    .pred-meta{font-size:11px;color:var(--text3)}
    
    .prob-bar{display:flex;border-radius:5px;overflow:hidden;height:8px;gap:2px;margin:8px 0 4px}
    .pb-home{background:var(--blue);} .pb-draw{background:#555} .pb-away{background:var(--red-dim);}
    .prob-labels{display:flex;font-size:11px;margin-bottom:10px}
    .pl-home{color:var(--blue);font-weight:600;min-width:60px} .pl-draw{flex:1;text-align:center;color:var(--text3)} .pl-away{color:#e87e87;font-weight:600;min-width:60px;text-align:right}
    
    .ai-gen-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px;background:var(--blue);border:none;border-radius:var(--r-sm);color:#fff;font-size:13px;font-weight:600;cursor:pointer;margin-top:6px;}
    .ai-gen-btn:disabled{opacity:.5;cursor:default}
    .refresh-btn{display:flex;align-items:center;justify-content:center;gap:6px;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);font-size:13px;padding:9px 13px;border-radius:var(--r-sm);cursor:pointer;margin-bottom:10px;width:100%;font-weight:600;}
    
    .error-box {background:rgba(232,0,28,.1); border:1px solid var(--red); color:var(--red); padding:10px; border-radius:6px; font-size:12px; margin-top:10px; line-height:1.5;}
  </style>
</head>
<body>

  <header class="header">
    <div class="header-top">
      <span class="logo-icon">⚽</span>
      <div class="title-block">
        <div class="t1">WC2026 Live</div>
        <div class="t2">Powered by Real API & Gemini</div>
      </div>
      <span class="badge-live">Live</span>
    </div>
    <div class="tabs-bar">
      <button class="tab-btn active" onclick="showTab('scores', this)">ผลบอลสด</button>
      <button class="tab-btn" onclick="showTab('predict', this)">วิเคราะห์ AI 🤖</button>
    </div>
  </header>

  <main>
    <div id="scores" class="panel active">
      <div class="status-bar">
        <div id="statusDot" class="dot-status yellow"></div><span id="statusMsg">กำลังเชื่อมต่อฐานข้อมูลกีฬา...</span>
      </div>
      <button class="refresh-btn" onclick="fetchRealLiveScores()">🔄 อัปเดตผลบอลล่าสุดของวันนี้</button>
      <div id="scores-content"><div style="text-align:center;padding:2rem;color:var(--text3)">กำลังโหลด...</div></div>
    </div>

    <div id="predict" class="panel">
      <div id="predict-content"></div>
    </div>
  </main>

  <script>
    /* =========================================
       API KEYS SETUP (ใส่คีย์ของคุณเรียบร้อยแล้ว)
    ========================================= */
    const GEMINI_API_KEY = "AIzaSyDszKzbzmU42cNKBqRXW0hDTHxnH2HZ9MY"; 
    const GEMINI_API_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + GEMINI_API_KEY;
    const SPORTS_API_KEY = "1a000774c906dc63552da55318b71f46"; 

    /* =========================================
       ระบบดึงผลบอลสด (REAL SPORTS API)
    ========================================= */
    const MOCK_REAL_MATCHES = [
      { group:"Group J", status:"live", minute: "62", home:{name:"Argentina",flag:"🇦🇷",score:1}, away:{name:"Algeria",flag:"🇩🇿",score:0}, time:"14 มิ.ย. 02:00" },
      { group:"Group I", status:"upcoming", minute: null, home:{name:"France",flag:"🇫🇷",score:null}, away:{name:"Senegal",flag:"🇸🇳",score:null}, time:"14 มิ.ย. 08:00" },
      { group:"Group E", status:"upcoming", minute: null, home:{name:"Germany",flag:"🇩🇪",score:null}, away:{name:"Ivory Coast",flag:"🇨🇮",score:null}, time:"15 มิ.ย. 02:00" }
    ];

    async function fetchRealLiveScores() {
      setStatus('yellow', 'กำลังเชื่อมต่อ API-Football...');
      try {
        if (!SPORTS_API_KEY) throw new Error("ยังไม่ได้ใส่คีย์ API-Football");

        // ดึงวันที่ปัจจุบันจากเครื่อง เพื่อดูโปรแกรมเตะของวันนี้
        const today = new Date().toISOString().split('T')[0];
        
        const res = await fetch(`https://v3.football.api-sports.io/fixtures?date=${today}`, {
          method: "GET",
          headers: {
            "x-apisports-key": SPORTS_API_KEY
          }
        });
        
        if (!res.ok) throw new Error(`HTTP Error: ${res.status}`);
        const data = await res.json();

        // เช็คว่าโควต้า API เต็มหรือ Key ผิดไหม
        if (data.errors && Object.keys(data.errors).length > 0) {
           throw new Error(Object.values(data.errors)[0]);
        }

        // คัดกรองและจัดรูปแบบข้อมูล
        if (data.response && data.response.length > 0) {
           const liveMatches = data.response.map(match => {
             const s = match.fixture.status.short;
             let status = 'upcoming';
             // สถานะจบเกม
             if (['FT', 'PEN', 'AET', 'AWD'].includes(s)) status = 'final';
             // สถานะกำลังเตะ
             else if (['1H', '2H', 'HT', 'ET', 'BT', 'P', 'SUSP', 'INT', 'LIVE'].includes(s)) status = 'live';

             // แปลงเวลาให้ดูง่ายขึ้นเป็นเวลาไทย
             const matchTime = new Date(match.fixture.date).toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'});
             const elapsed = match.fixture.status.elapsed;

             return {
               group: match.league.name, // ใช้ชื่อลีกแทนไปก่อน
               status: status,
               minute: elapsed ? elapsed : null,
               home: { name: match.teams.home.name, flag: "🏠", score: match.goals.home },
               away: { name: match.teams.away.name, flag: "✈️", score: match.goals.away },
               time: `${matchTime} น.`,
               venue: match.fixture.venue.name || 'ไม่ระบุสนาม',
               goals: [] 
             };
           });

           // เรียงลำดับ: คู่สดขึ้นก่อน -> คู่รอเตะ -> คู่จบแล้ว
           liveMatches.sort((a, b) => {
             const rank = { 'live': 1, 'upcoming': 2, 'final': 3 };
             return rank[a.status] - rank[b.status];
           });

           // แสดงผลแค่ 15 คู่แรกกันหน้าเว็บโหลดหนักเกินไป
           renderMatchList(liveMatches.slice(0, 15));
           setStatus('green', 'เชื่อมต่อสนามจริงสำเร็จ (API-Football)');
        } else {
           throw new Error("วันนี้ไม่มีโปรแกรมการแข่งขันฟุตบอล");
        }

      } catch (e) {
        console.warn("สลับมาใช้ข้อมูลจำลอง สาเหตุ:", e.message);
        renderMatchList(MOCK_REAL_MATCHES); 
        setStatus('red', `ระบบจำลอง (${e.message})`);
      }
    }

    function renderMatchList(matches) {
      let html = '';
      matches.forEach(m => {
        let sClass = m.status === 'live' ? 'ms-live' : m.status === 'final' ? 'ms-final' : 'ms-soon';
        let sText = m.status === 'live' ? `🔴 LIVE ${m.minute ? m.minute + "'" : ''}` : m.status === 'final' ? '✅ จบแล้ว' : `⏰ ${m.time}`;
        let homeScore = m.home.score !== null ? m.home.score : '-';
        let awayScore = m.away.score !== null ? m.away.score : '-';

        html += `
        <div class="match-card ${m.status}">
          <div class="match-status"><span class="${sClass}">${sText}</span> | ${m.group}</div>
          <div class="match-teams">
            <span class="team-name">${m.home.flag} ${m.home.name}</span>
            <div class="score-block">
              <span class="score-num">${homeScore}</span> : <span class="score-num">${awayScore}</span>
            </div>
            <span class="team-name away">${m.away.name} ${m.away.flag}</span>
          </div>
        </div>`;
      });
      document.getElementById('scores-content').innerHTML = html;
    }

    function setStatus(color, msg) {
      document.getElementById('statusDot').className = 'dot-status ' + color;
      document.getElementById('statusMsg').textContent = msg;
    }

    /* =========================================
       ระบบ AI วิเคราะห์เกม (GEMINI API)
    ========================================= */
    let predictions = JSON.parse(localStorage.getItem('wc26_preds') || '[]');
    const DEFAULT_MATCHES_FOR_PRED = [
      { id:'p1', home:'Argentina 🇦🇷', away:'Algeria 🇩🇿', group:'Group J', time:'14 มิ.ย. 02:00' },
      { id:'p2', home:'France 🇫🇷', away:'Senegal 🇸🇳', group:'Group I', time:'14 มิ.ย. 08:00' },
      { id:'p3', home:'Germany 🇩🇪', away:'Ivory Coast 🇨🇮', group:'Group E', time:'15 มิ.ย. 02:00' }
    ];

    function extractJSON(text) {
      let clean = text.trim();
      if (clean.startsWith('```json')) clean = clean.substring(7);
      else if (clean.startsWith('```')) clean = clean.substring(3);
      if (clean.endsWith('```')) clean = clean.substring(0, clean.length - 3);
      return JSON.parse(clean.trim());
    }

    async function generateAIPrediction(homeTeam, awayTeam, group, matchTime, predId) {
      const btn = document.getElementById('genBtn_' + predId);
      if (btn) { btn.disabled = true; btn.innerHTML = 'กำลังประมวลผลด้วย Gemini...'; }
      try {
        const res = await fetch(GEMINI_API_URL, { 
          method: "POST", headers: { "Content-Type": "application/json" }, 
          body: JSON.stringify({ contents: [{ parts: [{ text: `You are a football expert. Analyze match: ${homeTeam} vs ${awayTeam}. Return valid JSON ONLY: {"winner": "Team", "homeWin": 45, "draw": 25, "awayWin": 30, "reasons": "Explain in Thai (HTML strong tags allowed)"}` }] }] }) 
        });
        
        const data = await res.json();
        if (!res.ok) throw new Error(`${data.error?.message || 'API ถูกบล็อก'}`);
        
        const pred = extractJSON(data.candidates[0].content.parts[0].text);
        pred.id = predId; pred.home = homeTeam; pred.away = awayTeam; pred.group = group; pred.time = matchTime;
        
        const existing = predictions.findIndex(p => p.id === predId);
        if (existing >= 0) predictions[existing] = pred; else predictions.push(pred);
        localStorage.setItem('wc26_preds', JSON.stringify(predictions));
        renderPredictPanel();
      } catch (e) {
        const errHtml = `<div class="error-box"><strong>พบข้อผิดพลาดจาก Gemini:</strong><br>${e.message}</div>`;
        btn.insertAdjacentHTML('afterend', errHtml);
        btn.innerHTML = 'ลองใหม่อีกครั้ง'; btn.disabled = false;
      }
    }

    function renderPredictPanel() {
      let html = '';
      DEFAULT_MATCHES_FOR_PRED.forEach(m => {
        const pred = predictions.find(p => p.id === m.id);
        if (!pred) {
          html += `<div class="pred-card"><div class="pred-header"><div class="pred-match-title">${m.home} vs ${m.away}</div></div><button class="ai-gen-btn" id="genBtn_${m.id}" onclick="generateAIPrediction('${m.home}','${m.away}','${m.group}','${m.time}','${m.id}')">✨ ให้ Gemini วิเคราะห์เกมนี้</button></div>`;
        } else {
          html += `<div class="pred-card"><div class="pred-header"><div class="pred-match-title">${pred.home} vs ${pred.away}</div></div><div style="font-size:13px; margin-bottom:6px">คาดว่า <strong>${pred.winner}</strong> ชนะ</div><div class="prob-bar"><div class="pb-home" style="flex:${pred.homeWin}"></div><div class="pb-draw" style="flex:${pred.draw}"></div><div class="pb-away" style="flex:${pred.awayWin}"></div></div><div class="prob-labels"><span class="pl-home">${pred.homeWin}%</span><span class="pl-draw">${pred.draw}%</span><span class="pl-away">${pred.awayWin}%</span></div><div style="font-size:13px; color:#8b92a8; margin-top:10px">${pred.reasons}</div><button class="ai-gen-btn" style="background:#252a35" id="genBtn_${m.id}" onclick="generateAIPrediction('${m.home}','${m.away}','${m.group}','${m.time}','${m.id}')">🔄 วิเคราะห์ใหม่</button></div>`;
        }
      });
      document.getElementById('predict-content').innerHTML = html;
    }

    /* =========================================
       UI TABS CONTROL
    ========================================= */
    function showTab(id, el) { 
      document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active')); 
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active')); 
      document.getElementById(id).classList.add('active'); el.classList.add('active'); 
    }

    // โหลดข้อมูลเมื่อเปิดหน้าเว็บ
    document.addEventListener('DOMContentLoaded', () => { 
      fetchRealLiveScores(); 
      renderPredictPanel(); 
    });
  </script>
</body>
</html>
